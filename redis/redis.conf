# Redis Configuration for FounderLink

# Write logs to a file inside the container (mapped to ./redis/logs/ on host)
logfile /var/log/redis/redis.log

# Log level: debug | verbose | notice | warning
loglevel notice

# Max memory (optional - prevents Redis from eating all RAM)
maxmemory 256mb
maxmemory-policy allkeys-lru

# Save snapshots (RDB persistence)
save 900 1
save 300 10
save 60 10000
